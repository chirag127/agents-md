name: periodic-sync
# Heartbeat for the bidirectional sync. Currently a no-op — exists so the
# scheduling hook is in place. The actual fan-out happens locally via the
# `skill-agents-md-sync` skill on each machine.

on:
  schedule:
    - cron: '7 * * * *'   # every hour at :07 (off the :00 mark to avoid the GH cron stampede)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - name: Heartbeat
        run: |
          echo "agents-md periodic sync heartbeat $(date -u +%FT%TZ)"
          echo "No remote-side action needed — this workflow is a hook point only."
